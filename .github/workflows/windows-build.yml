name: Windows Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore WinUIMvvmApp/WinUIMvvmApp.csproj

    - name: Build for Windows
      run: dotnet build WinUIMvvmApp/WinUIMvvmApp.csproj -c Release -r win-x64 --no-restore

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WindowsExecutable
        path: |
          WinUIMvvmApp/bin/Release/net8.0-windows10.0.19041.0/win-x64/*
        retention-days: 7
