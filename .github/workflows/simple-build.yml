name: Simple Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Build
      run: dotnet build WinUIMvvmApp/WinUIMvvmApp.csproj --configuration Release
      
    - name: Test
      run: |
        if [ -f "WinUIMvvmApp/WinUIMvvmApp.csproj" ]; then
          echo "No test project found, skipping test step."
        else
          dotnet test --no-build --verbosity normal
        fi
