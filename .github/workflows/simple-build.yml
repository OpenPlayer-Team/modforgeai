name: Simple Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: List files
      run: |
        echo "Repository contents:"
        ls -la
        echo ""
        echo "WinUIMvvmApp contents:"
        ls -la WinUIMvvmApp/
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore
      working-directory: ./WinUIMvvmApp
      
    - name: Build
      run: dotnet build --configuration Release --no-restore
      working-directory: ./WinUIMvvmApp
      
    - name: Test
      run: dotnet test --no-build --verbosity normal
      working-directory: ./WinUIMvvmApp
